<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ABSENSI LINE TOGEL</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%94%92%3C/text%3E%3C/svg%3E">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    
    :root {
      --primary: #7c5cff;
      --primary-glow: rgba(124, 92, 255, 0.42);
      --secondary: #18e2d2;
      --secondary-glow: rgba(24, 226, 210, 0.22);
      --success: #20e3a2;
      --success-glow: rgba(32, 227, 162, 0.20);
      --danger: #ff5f7a;
      --danger-glow: rgba(255, 95, 122, 0.18);
      --warning: #ffd166;
      --warning-glow: rgba(255, 209, 102, 0.18);
      --dark-bg: #070915;
      --sidebar-bg: rgba(14, 18, 35, 0.82);
      --card-bg: rgba(18, 24, 45, 0.74);
      --card-bg-strong: rgba(25, 33, 61, 0.88);
      --glass-border: rgba(255, 255, 255, 0.12);
      --glass-border-strong: rgba(255, 255, 255, 0.20);
      --text-main: #ffffff;
      --text-muted: #aab2c5;
      --shadow-soft: 0 18px 55px rgba(0, 0, 0, 0.35);
      --shadow-card: 0 12px 35px rgba(0, 0, 0, 0.24);
      --radius-xl: 26px;
      --radius-lg: 20px;
      --radius-md: 14px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      width: 100%;
      min-height: 100%;
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      color: var(--text-main);
      overflow-x: hidden;
      position: relative;
      background:
        radial-gradient(circle at 18% -8%, rgba(124, 92, 255, 0.26), transparent 34%),
        radial-gradient(circle at 110% 8%, rgba(24, 226, 210, 0.18), transparent 33%),
        radial-gradient(circle at 50% 110%, rgba(255, 209, 102, 0.10), transparent 38%),
        linear-gradient(145deg, #060714 0%, #0a1022 46%, #070915 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -2;
      background-image:
        linear-gradient(rgba(255,255,255,0.032) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.026) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.70), transparent 82%);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      background:
        linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.045) 47%, transparent 54%),
        radial-gradient(circle at 50% 0%, rgba(255,255,255,0.06), transparent 40%);
      opacity: 0.62;
    }

    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(92px);
      z-index: -1;
      pointer-events: none;
      transform: translateZ(0);
    }

    .orb-1 {
      width: 360px;
      height: 360px;
      background: var(--primary);
      top: -150px;
      left: -125px;
      opacity: 0.32;
    }

    .orb-2 {
      width: 360px;
      height: 360px;
      background: var(--secondary);
      bottom: -150px;
      right: -120px;
      opacity: 0.22;
    }

    button,
    input {
      font-family: inherit;
    }

    button {
      touch-action: manipulation;
    }

    .login-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100svh;
      padding: 18px;
    }

    .login-card {
      position: relative;
      width: 100%;
      max-width: 420px;
      padding: 28px 22px 24px;
      overflow: hidden;
      background:
        linear-gradient(145deg, rgba(27, 35, 65, 0.92), rgba(13, 18, 36, 0.90)),
        radial-gradient(circle at 20% 0%, rgba(124, 92, 255, 0.18), transparent 42%);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow-soft), inset 0 1px 0 rgba(255,255,255,0.07);
    }

    .login-card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% -8%, rgba(24, 226, 210, 0.18), transparent 34%),
        linear-gradient(to bottom, rgba(255,255,255,0.08), transparent 20%);
    }

    .login-logo {
      position: relative;
      width: 74px;
      height: 74px;
      margin: 0 auto 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 24px;
      color: white;
      font-size: 31px;
      background:
        linear-gradient(135deg, var(--primary), var(--secondary)),
        linear-gradient(180deg, rgba(255,255,255,0.22), transparent);
      box-shadow: 0 16px 30px var(--primary-glow), inset 0 1px 0 rgba(255,255,255,0.35);
    }

    .login-logo::after {
      content: "";
      position: absolute;
      inset: -8px;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.10);
    }

    .login-title {
      position: relative;
      text-align: center;
      font-size: clamp(1.55rem, 6vw, 1.95rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.05;
      margin-bottom: 7px;
      text-shadow: 0 10px 28px rgba(0,0,0,0.4);
    }

    .login-sub {
      position: relative;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.88rem;
      margin-bottom: 28px;
    }

    .input-group {
      position: relative;
      margin-bottom: 15px;
    }

    .input-group i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--secondary);
      font-size: 0.96rem;
      z-index: 1;
      opacity: 0.92;
    }

    .input-group.has-password .form-control {
      padding-right: 52px;
    }

    .password-toggle {
      position: absolute;
      right: 13px;
      top: 50%;
      transform: translateY(-50%);
      width: 34px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 12px;
      color: rgba(255,255,255,0.72);
      background: rgba(255,255,255,0.055);
      cursor: pointer;
      z-index: 2;
      transition: background 0.2s, color 0.2s, transform 0.2s;
    }

    .password-toggle i {
      position: static;
      left: auto;
      top: auto;
      transform: none;
      color: inherit;
      font-size: 0.92rem;
      opacity: 1;
    }

    .password-toggle:hover,
    .password-toggle:focus-visible {
      color: var(--secondary);
      background: rgba(24, 226, 210, 0.10);
      outline: none;
    }

    .password-toggle:active {
      transform: translateY(-50%) scale(0.96);
    }

    .form-control {
      width: 100%;
      min-height: 50px;
      padding: 14px 14px 14px 46px;
      color: white;
      font-size: 1rem;
      outline: none;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.075), rgba(255,255,255,0.035)),
        rgba(0,0,0,0.22);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s, transform 0.2s;
    }

    .form-control::placeholder {
      color: rgba(170, 178, 197, 0.72);
    }

    .form-control:focus {
      border-color: rgba(24, 226, 210, 0.68);
      box-shadow: 0 0 0 4px rgba(24, 226, 210, 0.10), inset 0 1px 0 rgba(255,255,255,0.08);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.045)),
        rgba(0,0,0,0.24);
    }

    .btn-login,
    .btn-submit {
      position: relative;
      width: 100%;
      min-height: 48px;
      padding: 13px 16px;
      overflow: hidden;
      border: none;
      border-radius: 16px;
      color: white;
      font-weight: 800;
      letter-spacing: 0.01em;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background:
        linear-gradient(135deg, #8668ff 0%, #5d4be6 45%, #16d6ca 100%);
      box-shadow: 0 16px 30px rgba(93, 75, 230, 0.30), inset 0 1px 0 rgba(255,255,255,0.22);
      transition: transform 0.18s, opacity 0.18s, filter 0.18s;
    }

    .btn-login {
      margin-top: 10px;
    }

    .btn-login::before,
    .btn-submit::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
      transform: translateX(-120%);
      transition: transform 0.55s;
    }

    .btn-login:hover::before,
    .btn-submit:hover::before {
      transform: translateX(120%);
    }

    .btn-login:active,
    .btn-submit:active,
    .btn-logout:active {
      transform: scale(0.985);
      opacity: 0.88;
    }

    .btn-login:disabled,
    .btn-submit:disabled {
      opacity: 0.54;
      cursor: not-allowed;
      filter: grayscale(0.25);
    }

    .login-error {
      position: relative;
      min-height: 20px;
      margin-top: 14px;
      text-align: center;
      color: var(--danger);
      font-size: 0.88rem;
      font-weight: 600;
    }

    .app-layout {
      width: 100%;
      max-width: 1500px;
      min-height: 100vh;
      min-height: 100svh;
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin: 0 auto;
      padding: 12px;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 0;
    }

    .main-content {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .web-header {
      display: none;
    }

    .mobile-header {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: -12px -12px 0;
      padding: calc(12px + env(safe-area-inset-top, 0px)) 12px 12px;
      background: rgba(7, 9, 21, 0.76);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(18px);
    }

    .m-logo {
      flex: 0 0 auto;
      width: 42px;
      height: 42px;
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
      background:
        linear-gradient(135deg, var(--primary), var(--secondary));
      box-shadow: 0 10px 24px var(--primary-glow), inset 0 1px 0 rgba(255,255,255,0.25);
    }

    .m-title {
      min-width: 0;
    }

    .m-title h1 {
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      white-space: nowrap;
    }

    .m-title p {
      margin-top: 3px;
      font-size: 0.75rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }

    .live-badge-m {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 30px;
      padding: 6px 10px;
      border-radius: 999px;
      color: rgba(255,255,255,0.90);
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.045));
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #6c7482;
      box-shadow: 0 0 0 4px rgba(108, 116, 130, 0.10);
    }

    .live-dot.connected {
      background: var(--success);
      box-shadow: 0 0 0 4px rgba(32, 227, 162, 0.11), 0 0 14px var(--success);
    }

    .date-mobile {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 2px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .date-mobile::-webkit-scrollbar {
      display: none;
    }

    .date-mobile span {
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
      gap: 6px;
      padding: 8px 11px;
      border-radius: 999px;
      color: var(--text-muted);
      font-size: 0.76rem;
      font-weight: 650;
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .date-mobile i {
      color: var(--secondary);
    }

    .stats-container {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .stat-box {
      position: relative;
      overflow: hidden;
      min-width: 0;
      padding: 12px 8px;
      border-radius: 18px;
      text-align: center;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.090), rgba(255,255,255,0.040)),
        var(--card-bg);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: var(--shadow-card), inset 0 1px 0 rgba(255,255,255,0.07);
      backdrop-filter: blur(16px);
    }

    .stat-box::after {
      content: "";
      position: absolute;
      inset: auto -20% -50% -20%;
      height: 72%;
      background: radial-gradient(circle, rgba(124,92,255,0.18), transparent 62%);
      pointer-events: none;
    }

    .stat-num {
      position: relative;
      z-index: 1;
      font-size: clamp(1.35rem, 6vw, 1.85rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.05em;
      font-variant-numeric: tabular-nums;
    }

    .stat-label {
      position: relative;
      z-index: 1;
      margin-top: 6px;
      color: var(--text-muted);
      font-size: 0.62rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .stat-box.hadir {
      border-color: rgba(32, 227, 162, 0.20);
    }

    .stat-box.hadir::after {
      background: radial-gradient(circle, rgba(32,227,162,0.20), transparent 62%);
    }

    .stat-box.belum {
      border-color: rgba(255, 95, 122, 0.20);
    }

    .stat-box.belum::after {
      background: radial-gradient(circle, rgba(255,95,122,0.18), transparent 62%);
    }

    .stat-box.hadir .stat-num {
      color: var(--success);
      text-shadow: 0 0 18px rgba(32, 227, 162, 0.28);
    }

    .stat-box.belum .stat-num {
      color: var(--danger);
      text-shadow: 0 0 18px rgba(255, 95, 122, 0.26);
    }

    .card {
      position: relative;
      overflow: hidden;
      padding: 16px;
      border-radius: var(--radius-lg);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.080), rgba(255,255,255,0.030)),
        var(--card-bg);
      border: 1px solid rgba(255,255,255,0.11);
      box-shadow: var(--shadow-card), inset 0 1px 0 rgba(255,255,255,0.06);
      backdrop-filter: blur(18px);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 0%, rgba(124,92,255,0.12), transparent 30%),
        radial-gradient(circle at 90% 4%, rgba(24,226,210,0.08), transparent 32%);
    }

    .card > * {
      position: relative;
      z-index: 1;
    }

    .form-label {
      display: block;
      margin-bottom: 10px;
      color: var(--text-muted);
      font-size: 0.74rem;
      font-weight: 800;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    .user-info-card {
      display: flex;
      align-items: center;
      gap: 13px;
      min-height: 76px;
      margin-bottom: 14px;
      padding: 13px;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.03)),
        rgba(0,0,0,0.16);
      border: 1px solid rgba(255,255,255,0.09);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .user-avatar {
      flex: 0 0 auto;
      width: 52px;
      height: 52px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.02em;
      background:
        linear-gradient(135deg, var(--primary), var(--secondary));
      box-shadow: 0 12px 24px rgba(124, 92, 255, 0.25), inset 0 1px 0 rgba(255,255,255,0.24);
    }

    .user-detail {
      min-width: 0;
      flex: 1;
    }

    .user-detail h3 {
      margin-bottom: 4px;
      font-size: 1.04rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.15;
      overflow-wrap: anywhere;
    }

    .user-detail p {
      color: var(--text-muted);
      font-size: 0.76rem;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .btn-logout {
      width: 100%;
      min-height: 44px;
      margin-top: 10px;
      padding: 11px 14px;
      border-radius: 15px;
      cursor: pointer;
      color: rgba(255,255,255,0.88);
      font-weight: 800;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03)),
        rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.12);
      transition: transform 0.18s, background 0.18s, border-color 0.18s;
    }

    .btn-logout:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.18);
    }

    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .list-title {
      min-width: 0;
      font-size: 1.03rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      white-space: nowrap;
    }

    .search-box {
      position: relative;
      width: min(46vw, 190px);
      flex: 0 1 auto;
    }

    .search-box input {
      width: 100%;
      min-height: 38px;
      padding: 9px 11px 9px 35px;
      border-radius: 14px;
      color: white;
      font-size: 0.86rem;
      outline: none;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.075), rgba(255,255,255,0.030)),
        rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.10);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-box input::placeholder {
      color: rgba(170, 178, 197, 0.70);
    }

    .search-box input:focus {
      border-color: rgba(24,226,210,0.60);
      box-shadow: 0 0 0 4px rgba(24,226,210,0.09);
    }

    .search-box i {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--secondary);
      font-size: 0.78rem;
      opacity: 0.9;
    }

    .staff-list {
      display: flex;
      flex-direction: column;
      gap: 9px;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding-right: 1px;
      scrollbar-width: thin;
      scrollbar-color: rgba(124, 92, 255, 0.55) transparent;
    }

    .staff-list::-webkit-scrollbar {
      width: 4px;
    }

    .staff-list::-webkit-scrollbar-thumb {
      background: rgba(124, 92, 255, 0.55);
      border-radius: 999px;
    }

    .staff-row {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-width: 0;
      padding: 12px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.07);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.060), rgba(255,255,255,0.025)),
        rgba(255,255,255,0.028);
      box-shadow: 0 10px 22px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.045);
      transition: transform 0.16s, border-color 0.18s, background 0.18s, box-shadow 0.18s;
    }

    .staff-row:hover {
      transform: translateY(-1px);
      border-color: rgba(255,255,255,0.14);
      box-shadow: 0 14px 28px rgba(0,0,0,0.16), inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .staff-row.is-hadir {
      background:
        linear-gradient(180deg, rgba(32,227,162,0.16), rgba(32,227,162,0.055)),
        rgba(32, 227, 162, 0.05);
      border-color: rgba(32, 227, 162, 0.22);
      box-shadow: 0 10px 24px rgba(32, 227, 162, 0.08), inset 0 1px 0 rgba(255,255,255,0.055);
    }

    .staff-row.is-hadir .status-badge {
      background: linear-gradient(135deg, rgba(32,227,162,0.98), rgba(16,185,129,0.92));
      color: #03140f;
      box-shadow: 0 0 18px rgba(32,227,162,0.18);
    }

    .section-divider {

      justify-content: space-between;

      font-weight: 800;

        linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.055)),

    }

    .kategori-chip {

      vertical-align: middle;
      font-size: 0.56rem;
      font-weight: 800;
      letter-spacing: 0.04em;

      border: 1px solid rgba(255,255,255,0.09);

      border-color: rgba(255, 209, 102, 0.36);
    }

    .user-info-small {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }

    .avatar-small {
      flex: 0 0 auto;
      width: 40px;
      height: 40px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 0.80rem;
      font-weight: 800;
      background: linear-gradient(135deg, #667085, #293244);

    .user-detail-small span {

    .status-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 92px;
      max-width: 118px;
      min-height: 28px;
      padding: 5px 8px;
      border-radius: 999px;
      font-size: 0.60rem;
      font-weight: 900;
      letter-spacing: 0.035em;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.05;
      white-space: normal;
    }

    .time-display {
      margin-top: 5px;

      margin-top: 4px;
      color: var(--warning);
      font-size: 0.64rem;
      line-height: 1.25;
      font-style: italic;
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 50% 28%, rgba(124,92,255,0.20), transparent 30%),
        var(--dark-bg);
      transition: opacity 0.2s;
    }

    .loader-circle {
      width: 54px;

      border-radius: 50%;

      border-right-color: rgba(124, 92, 255, 0.75);
      animation: spin 0.72s linear infinite;
      box-shadow: 0 0 24px rgba(24, 226, 210, 0.16);

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loader-text {
      margin-top: 15px;
      color: var(--text-muted);
      font-size: 0.80rem;
      font-weight: 800;
      letter-spacing: 0.06em;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .skeleton,
    .skeleton-avatar,
    .skeleton-line {
      background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.13) 50%, rgba(255,255,255,0.05) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.35s infinite;

    .skeleton {
      border-radius: 10px;
    }

    .skeleton-avatar {

      height: 52px;

    }

    .skeleton-line {
      height: 14px;
      width: 100%;
      margin-bottom: 8px;
      border-radius: 999px;
    }

    .skeleton-line.short {
      width: 60%;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(18px + var(--safe-bottom));
      z-index: 10000;
      transform: translateX(-50%) translateY(90px);
      width: calc(100% - 28px);
      max-width: 440px;
      padding: 13px 16px;
      border-radius: 16px;
      color: white;
      font-size: 0.88rem;
      font-weight: 800;
      text-align: center;
      opacity: 0;
      transition: transform 0.22s, opacity 0.22s;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04)),
        #23283a;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 18px 40px rgba(0,0,0,0.30);
      backdrop-filter: blur(16px);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .toast.success {
      color: #03140f;
      background: linear-gradient(135deg, #20e3a2, #10b981);
    }

    .toast.error {
      background: linear-gradient(135deg, #ff5f7a, #e73d5d);
    }

    .toast.warning {
      color: #291b00;
      background: linear-gradient(135deg, #ffd166, #ffb703);
    }

    #mainApp {
      display: none;
    }

    @media (max-width: 430px) {
      .app-layout {
        padding: 10px;
        gap: 12px;
      }

      .mobile-header {
        margin: -10px -10px 0;
        padding-left: 10px;
        padding-right: 10px;
      }

      .card {
        padding: 14px;
        border-radius: 19px;
      }

      .stats-container {
        gap: 7px;
      }

      .stat-box {
        padding: 11px 6px;
        border-radius: 16px;
      }

      .stat-label {
        font-size: 0.57rem;
      }

      .list-header {
        gap: 8px;
      }

      .list-title {
        font-size: 0.96rem;
      }

      .search-box {
        width: 44vw;
      }

      .staff-row {
        align-items: flex-start;
        gap: 10px;
        padding: 11px;
        border-radius: 16px;
      }

      .avatar-small {
        width: 38px;
        height: 38px;
        border-radius: 13px;
      }

      .user-detail-small h4 {
        font-size: 0.84rem;
      }

      .user-detail-small span {
        font-size: 0.67rem;
      }

      .status-badge {
        min-width: 82px;
        max-width: 96px;
        min-height: 27px;
        padding: 5px 7px;
        font-size: 0.55rem;
      }

      .time-display {
        font-size: 0.64rem;
      }
    }

    @media (max-width: 360px) {
      .live-badge-m {
        padding: 6px 8px;
        font-size: 0.62rem;
      }

      .m-title h1 {
        font-size: 0.98rem;
      }

      .m-title p {
        font-size: 0.70rem;
      }

      .search-box {
        width: 42vw;
      }

      .staff-row {
        gap: 8px;
      }

      .user-info-small {
        gap: 8px;
      }

      .status-badge {
        min-width: 76px;
        max-width: 86px;
        font-size: 0.51rem;
      }
    }

    @media (min-width: 640px) and (max-width: 900px) {
      .app-layout {
        padding: 18px;
        gap: 16px;
      }

      .mobile-header {
        margin: -18px -18px 0;
        padding-left: 18px;
        padding-right: 18px;
      }

      .stats-container {
        gap: 12px;
      }

      .card {
        padding: 18px;
      }
    }

    @media (min-width: 901px) {
      .app-layout {
        grid-template-columns: minmax(290px, 330px) minmax(0, 1fr);
        gap: 24px;
        padding: 24px;
      }

      .sidebar {
        position: sticky;
        top: 24px;
        height: calc(100vh - 48px);
        padding: 22px;
        border-radius: var(--radius-xl);
        background:
          linear-gradient(180deg, rgba(255,255,255,0.080), rgba(255,255,255,0.030)),
          var(--sidebar-bg);
        border: 1px solid rgba(255,255,255,0.12);
        box-shadow: var(--shadow-soft), inset 0 1px 0 rgba(255,255,255,0.06);
        backdrop-filter: blur(20px);
      }

      .main-content {
        min-height: calc(100vh - 48px);
      }

      .main-content > .card {
        min-height: calc(100vh - 48px);
      }

      .mobile-header,
      .date-mobile {
        display: none;
      }

      .web-header {
        display: block;
        text-align: center;
      }

      .stats-container {
        gap: 10px;
      }

      .card {
        padding: 20px;
      }

      .staff-list {
        max-height: calc(100vh - 142px);
        padding-right: 5px;
      }

      .section-divider {
        top: 0;
      }

      .search-box {
        width: 220px;
      }

      .staff-row {
        padding: 13px 14px;
      }
    }

    @media (min-width: 1200px) {
      .app-layout {
        grid-template-columns: 330px minmax(0, 1fr);
        gap: 28px;
        padding: 28px;
      }

      .sidebar {
        top: 28px;
        height: calc(100vh - 56px);
      }

      .main-content,
      .main-content > .card {
        min-height: calc(100vh - 56px);
      }

      .staff-list {
        max-height: calc(100vh - 152px);
      }
    }


    /* OPTIMASI MOBILE: tampilan tetap sama, efek berat dikurangi agar scroll tidak ngelag */
    @media (max-width: 900px) {
      html {
        scroll-behavior: auto;
      }

      body {
        background:
          radial-gradient(circle at 18% -8%, rgba(124, 92, 255, 0.18), transparent 34%),
          radial-gradient(circle at 110% 8%, rgba(24, 226, 210, 0.12), transparent 33%),
          linear-gradient(145deg, #060714 0%, #0a1022 46%, #070915 100%);
      }

      body::before,
      body::after,
      .bg-orb {
        display: none !important;
      }

      .login-card,
      .mobile-header,
      .card,
      .stat-box,
      .user-info-card,
      .toast {
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
      }

      .mobile-header {
        background: rgba(7, 9, 21, 0.96);
      }

      .card,
      .login-card,
      .staff-row,
      .stat-box,
      .user-info-card {
        box-shadow: 0 8px 18px rgba(0,0,0,0.18) !important;
      }

      .staff-list {
        -webkit-overflow-scrolling: touch;
        contain: content;
        will-change: scroll-position;
      }

      .staff-row {
        contain: layout paint;
        transition: border-color 0.16s, background-color 0.16s !important;
      }

      .staff-row:hover {
        transform: none !important;
      }

      .btn-login::before,
      .btn-submit::before,
      .login-card::before,
      .login-logo::after {
        display: none !important;
      }

      .skeleton,
      .skeleton-avatar,
      .skeleton-line {
        animation-duration: 1.9s !important;
      }

      .staff-row.blink-warning {
        animation-duration: 1.4s;
      }
    }



    /* FIX SCROLL MOBILE: halaman mobile pakai scroll utama browser, bukan scroll dalam list */
    @media (max-width: 900px) {
      html,
      body {
        height: auto !important;
        min-height: 100% !important;
        overflow-x: hidden !important;
        overflow-y: auto !important;
        -webkit-overflow-scrolling: touch;
        touch-action: pan-y;
      }

      body {
        position: relative !important;
      }

      .app-layout,
      .sidebar,
      .main-content,
      .main-content > .card {
        height: auto !important;
        min-height: 0 !important;
        max-height: none !important;
        overflow: visible !important;
      }

      .app-layout {
        padding-bottom: calc(26px + var(--safe-bottom));
      }

      .main-content > .card {
        display: flex !important;
        flex-direction: column !important;
      }

      .staff-list {
        flex: 0 0 auto !important;
        height: auto !important;
        min-height: 0 !important;
        max-height: none !important;
        overflow: visible !important;
        overscroll-behavior: auto !important;
        -webkit-overflow-scrolling: auto !important;
        contain: none !important;
        will-change: auto !important;
        touch-action: pan-y !important;
        padding-bottom: 18px;
      }

      .staff-row,
      .card,
      .section-divider {
        touch-action: pan-y !important;
      }

      .section-divider {
        position: static !important;
        top: auto !important;
      }
    }


    /* FIX MOBILE BLACK SCREEN: mode scroll ringan untuk HP agar tidak blank/hitam saat scroll cepat */
    @media (max-width: 900px) {
      html {
        background: #070915 !important;
        overscroll-behavior-y: contain;
      }

      body {
        min-height: 100dvh !important;
        background: #070915 !important;
        background-image: none !important;
        overscroll-behavior-y: contain;
        -webkit-font-smoothing: antialiased;
      }

      body::before,
      body::after,
      .bg-orb,
      .login-card::before,
      .login-logo::after,
      .btn-login::before,
      .btn-submit::before {
        display: none !important;
        content: none !important;
      }

      .login-page,
      .app-layout,
      .sidebar,
      .main-content,
      .main-content > .card,
      .card,
      .staff-list {
        transform: none !important;
        -webkit-transform: none !important;
        perspective: none !important;
        contain: none !important;
        will-change: auto !important;
        backface-visibility: visible !important;
        -webkit-backface-visibility: visible !important;
      }

      .mobile-header {
        position: relative !important;
        top: auto !important;
        z-index: 2 !important;
        background: #0b1020 !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
        box-shadow: none !important;
        transform: none !important;
        -webkit-transform: none !important;
        will-change: auto !important;
      }

      .card,
      .login-card,
      .stat-box,
      .user-info-card,
      .staff-row,
      .section-divider,
      .live-badge-m,
      .status-badge,
      .m-logo,
      .user-avatar,
      .avatar-small,
      .btn-submit,
      .btn-login,
      .btn-logout,
      .form-control,
      .search-box input,
      .toast {
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
        box-shadow: none !important;
        filter: none !important;
        transform: none !important;
        -webkit-transform: none !important;
        transition: none !important;
        will-change: auto !important;
      }

      .card,
      .login-card {
        background: #11182d !important;
        border-color: rgba(255,255,255,0.12) !important;
      }

      .stat-box,
      .user-info-card,
      .form-control,
      .search-box input,
      .live-badge-m {
        background: #151d34 !important;
      }

      .staff-row {
        background: #121d34 !important;
        border-color: rgba(255,255,255,0.10) !important;
      }

      .staff-row.is-hadir {
        background: #12342f !important;
        border-color: rgba(32,227,162,0.30) !important;
      }

      .staff-row.terlambat-row {
        background: #321622 !important;
        border-color: rgba(255,95,122,0.42) !important;
      }

      .staff-row.blink-warning {
        animation: none !important;
        background: #332b18 !important;
        border-color: rgba(255,209,102,0.58) !important;
      }

      .staff-row.off-row {
        background: #181d2e !important;
        border-color: rgba(255,255,255,0.10) !important;
      }

      .section-divider {
        position: relative !important;
        top: auto !important;
        z-index: 1 !important;
        background: #151d34 !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
      }

      .section-divider.off-section {
        background: #211d2a !important;
      }

      .staff-row.is-hadir .status-badge {
        background: #20e3a2 !important;
        color: #03140f !important;
      }

      .status-badge.status-terlambat {
        background: #ff5f7a !important;
        color: #ffffff !important;
      }

      .status-badge.status-bisa {
        background: #ffd166 !important;
        color: #291b00 !important;
      }

      .staff-list {
        display: block !important;
        overflow: visible !important;
      }

      .staff-list > * + * {
        margin-top: 9px;
      }

      body.scrolling-mobile *,
      body.scrolling-mobile *::before,
      body.scrolling-mobile *::after {
        animation: none !important;
        transition: none !important;
      }

      body.scrolling-mobile .staff-row,
      body.scrolling-mobile .card,
      body.scrolling-mobile .stat-box,
      body.scrolling-mobile .user-info-card,
      body.scrolling-mobile .section-divider {
        box-shadow: none !important;
        filter: none !important;
        transform: none !important;
        -webkit-transform: none !important;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }
  
  </style>
</head>

      </div>
      <div class="login-title">LINE TOGEL</div>
      <div class="login-sub">Absensi Harian</div>

      <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" id="loginUsername" class="form-control" placeholder="Username" autocomplete="off">
      </div>
      <div class="input-group has-password">
        <i class="fas fa-lock"></i>
        <input type="password" id="loginPassword" class="form-control" placeholder="Password">
        <button type="button" class="password-toggle" id="passwordToggle" onclick="togglePasswordVisibility()" aria-label="Tampilkan password">
          <i class="fas fa-eye" id="passwordToggleIcon"></i>
        </button>
      </div>

      <button class="btn-login" id="loginBtn" onclick="handleLogin()">
        <i class="fas fa-sign-in-alt"></i> MASUK
      </button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>

  <!-- Aplikasi Utama -->
  <div class="app-layout" id="mainApp">
    
    <!-- SIDEBAR -->
    <div class="sidebar">
      
      <!-- Web Header (Desktop) -->
      <div class="web-header">
        <div style="width:60px;height:60px;background:linear-gradient(135deg, var(--primary), var(--secondary));border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 15px;font-size:26px;box-shadow: 0 10px 20px var(--primary-glow);">
          <i class="fas fa-fingerprint"></i>
        </div>
        <h1 style="font-size:1.2rem;font-weight:800;">LINE TOGEL</h1>
        <p style="font-size:0.8rem;color:var(--text-muted);margin-bottom:5px;">Absensi Harian</p>
        
        <div class="live-badge-m" style="justify-content:center; margin-top:10px; margin-bottom:20px;">
          <div class="live-dot" id="liveDotDesk"></div>
          <span id="liveTextDesk">OFFLINE</span>
        </div>
      </div>

      <!-- Mobile Header -->
      <div class="mobile-header">
        <div style="display:flex; align-items:center; gap:10px;">
          <div class="m-logo"><i class="fas fa-fingerprint"></i></div>
          <div class="m-title">
            <h1>LINE TOGEL</h1>
            <p id="currentTimeMobile">--:--:--</p>
          </div>
        </div>
        <div class="live-badge-m">
          <div class="live-dot" id="liveDotMob"></div>
          <span id="liveTextMob">OFFLINE</span>
        </div>
      </div>

      <div class="date-mobile" id="dateMobile">
        <span><i class="fas fa-calendar"></i> <span id="currentDateMobile">-</span></span>
      </div>

      <!-- Stats (sudah diperkecil untuk mobile via CSS) -->
      <div class="stats-container">
        <div class="stat-box">
          <div class="stat-num" id="totalStaff">0</div>
          <div class="stat-label">Total</div>
        </div>
        <div class="stat-box hadir">
          <div class="stat-num" id="presentCount">0</div>
          <div class="stat-label">Absen</div> <!-- Ubah "Bangun" menjadi "Absen" -->
        </div>
        <div class="stat-box belum">
          <div class="stat-num" id="absentCount">0</div>
          <div class="stat-label">Belum</div>
        </div>
      </div>

      <!-- User Info dan Absensi -->
      <div class="card" style="margin-bottom:0;">
        <div class="form-label">Anda Login Sebagai</div>
        <div id="userInfoContainer" class="user-info-card">
          <!-- Akan diisi oleh JavaScript, default skeleton akan ditampilkan jika tidak ada data -->
        </div>
        <button class="btn-submit" id="submitBtn" onclick="handleMarkAttendance()">
          <i class="fas fa-check-circle"></i> ABSEN
        </button>
        <button class="btn-logout" id="logoutBtn" onclick="handleLogout()">
          <i class="fas fa-sign-out-alt"></i> LOGOUT
        </button>
      </div>
      
      <div style="margin-top:auto; text-align:center; color:var(--text-muted); font-size:0.75rem; display:none;" id="desktopDateWrap">
         <span id="currentDateDesktop"></span>
      </div>

    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
      
      <div class="card" style="margin-bottom:0; height:100%; display:flex; flex-direction:column;">
        <div class="list-header">
          <div class="list-title">Rekap Hari Ini</div>
          <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="staffSearch" placeholder="Cari..." oninput="filterTable()">
          </div>
        </div>
        <div class="staff-list" id="attendanceBody"></div>
      </div>

    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ========== KONFIGURASI ==========
    const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbxRNqN3xohIU8l04bFubc_G5Ca4GJCLC0chLHbKz971ut97IxywgcFp7P7ZaC3iBF8Dvw/exec';

    let staffData = [];
    let isProcessing = false;
    let currentUser = null; // { username, nama }
    let currentStaff = null; // data staff yang sesuai dengan user login
    let currentTimeStr = "00:00:00"; // untuk menyimpan waktu sekarang format HH:MM:SS
    let syncTimer = null;
    let syncInProgress = false;
    let lastDataSignature = '';
    let lastRenderKey = '';
    let lastClockMinute = '';
    let tableRenderFrame = null;
    let searchDebounceTimer = null;
    let mobileScrollTimer = null;
    let mobileScrollActive = false;
    let pendingRenderAfterScroll = false;
    let pendingRenderForce = false;
    const DEBUG_LOG = false;

    // Elemen DOM
    const elements = {
      loading: document.getElementById('loadingOverlay'),
      loadingText: document.getElementById('loadingText'),
      loginPage: document.getElementById('loginPage'),
      mainApp: document.getElementById('mainApp'),
      loginUsername: document.getElementById('loginUsername'),
      loginPassword: document.getElementById('loginPassword'),
      loginBtn: document.getElementById('loginBtn'),
      loginError: document.getElementById('loginError'),
      userInfoContainer: document.getElementById('userInfoContainer'),
      submitBtn: document.getElementById('submitBtn'),
      logoutBtn: document.getElementById('logoutBtn'),
      attendanceBody: document.getElementById('attendanceBody'),
      totalStaff: document.getElementById('totalStaff'),
      presentCount: document.getElementById('presentCount'),
      absentCount: document.getElementById('absentCount'),
      toast: document.getElementById('toast'),
      liveDotMob: document.getElementById('liveDotMob'),
      liveTextMob: document.getElementById('liveTextMob'),
      currentTimeMobile: document.getElementById('currentTimeMobile'),
      currentDateMobile: document.getElementById('currentDateMobile'),
      liveDotDesk: document.getElementById('liveDotDesk'),
      liveTextDesk: document.getElementById('liveTextDesk'),
      desktopDateWrap: document.getElementById('desktopDateWrap'),
      currentDateDesktop: document.getElementById('currentDateDesktop'),
      staffSearch: document.getElementById('staffSearch')
    };

    // ========== INISIALISASI ==========
    (function init() {
      const savedUser = sessionStorage.getItem('currentUser');
      if (savedUser) {
        try {
          currentUser = JSON.parse(savedUser);
          showMainApp();
        } catch (e) {
          sessionStorage.removeItem('currentUser');
          showLogin();
        }
      } else {
        showLogin();
      }

      if (window.location.protocol === 'file:') {
        elements.loadingText.innerText = "Buka via hosting (file:// tidak didukung)";
        throw new Error("Local file blocked");
      }

      updateClock();
      setInterval(updateClock, 1000);

      window.addEventListener('scroll', handleMobileScroll, { passive: true });
      window.addEventListener('touchmove', handleMobileScroll, { passive: true });
      window.addEventListener('touchend', finishMobileScrollSoon, { passive: true });
      window.addEventListener('resize', () => {
        if (!isMobileView()) {
          mobileScrollActive = false;
          pendingRenderAfterScroll = false;
          pendingRenderForce = false;
          document.body.classList.remove('scrolling-mobile');
        }
      }, { passive: true });
    })();

    function stopSync() {
      if (syncTimer) {
        clearTimeout(syncTimer);
        syncTimer = null;
      }
      syncInProgress = false;
    }

    function showLogin() {
      stopSync();
      elements.loading.style.display = 'none';
      elements.loginPage.style.display = 'flex';
      elements.mainApp.style.display = 'none';
    }

    function showMainApp() {
      elements.loading.style.display = 'none';
      elements.loginPage.style.display = 'none';
      elements.mainApp.style.display = window.innerWidth <= 900 ? 'block' : 'grid';
      // Tampilkan skeleton segera
      showSkeletonUserInfo();
      if (!syncTimer && !syncInProgress) startSync();
      if (window.innerWidth > 900) {
        elements.desktopDateWrap.style.display = 'block';
      }
    }

    function showSkeletonUserInfo() {
      elements.userInfoContainer.innerHTML = `
        <div style="display:flex; align-items:center; gap:15px; width:100%;">
          <div class="skeleton-avatar"></div>
          <div style="flex:1">
            <div class="skeleton-line short"></div>
            <div class="skeleton-line" style="width:80%;"></div>
          </div>
        </div>
      `;
    }


    function isMobileView() {
      return window.matchMedia && window.matchMedia('(max-width: 900px)').matches;
    }

    function handleMobileScroll() {
      if (!isMobileView()) return;
      if (!mobileScrollActive) {
        mobileScrollActive = true;
        document.body.classList.add('scrolling-mobile');
      }
      finishMobileScrollSoon();
    }

    function finishMobileScrollSoon() {
      if (!isMobileView()) return;
      if (mobileScrollTimer) clearTimeout(mobileScrollTimer);
      mobileScrollTimer = setTimeout(() => {
        mobileScrollActive = false;
        document.body.classList.remove('scrolling-mobile');
        if (pendingRenderAfterScroll) {
          const force = pendingRenderForce;
          pendingRenderAfterScroll = false;
          pendingRenderForce = false;
          scheduleTableRender(force);
        }
      }, 220);
    }

    function getWibNow() {
      return new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Jakarta' }));
    }

    function updateClock() {
      const now = getWibNow();
      const days = ['Min', 'Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab'];
      const dStr = `${days[now.getDay()]}, ${now.toLocaleDateString('id-ID')} WIB`;
      const tStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
      const minuteKey = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
      
      // Simpan currentTimeStr untuk perbandingan jam kerja
      currentTimeStr = tStr;
      
      // Saat mobile sedang scroll cepat, jangan repaint header setiap detik agar layar tidak blank/hitam.
      if (!(isMobileView() && mobileScrollActive)) {
        if (elements.currentTimeMobile) elements.currentTimeMobile.innerText = tStr;
        if (elements.currentDateMobile) elements.currentDateMobile.innerText = dStr;
        if (elements.currentDateDesktop) elements.currentDateDesktop.innerText = dStr;
      }

      // Optimasi mobile: jam tetap jalan tiap detik, tabel cukup dihitung ulang saat menit berganti.
      // Ini menjaga status BISA ABSEN / TERLAMBAT tetap akurat tanpa render ulang berat tiap detik.
      if (minuteKey !== lastClockMinute) {
        lastClockMinute = minuteKey;
        scheduleTableRender(false);
      }
    }

    function formatWaktu(waktuStr) {
      // Jangan convert ke new Date(), karena bisa berubah akibat timezone/browser.
      // Ambil jam persis dari backend / Google Sheet.
      const raw = String(waktuStr || '').trim();
      if (!raw || raw === '-' || raw.toLowerCase() === 'null' || raw.toLowerCase() === 'undefined') return '-';
      const m = raw.match(/(\d{1,2})[:.](\d{2})(?::(\d{2}))?/);
      if (!m) return '-';
      return `${String(m[1]).padStart(2, '0')}:${m[2]}:${m[3] || '00'}`;
    }

    function setLiveStatus(status) {
      // Ubah teks LIVE menjadi ONLINE
      const dotClass = status === 'connected' ? 'connected' : '';
      const text = status === 'connected' ? 'ONLINE' : 'OFFLINE';
      if (elements.liveDotMob) {
        elements.liveDotMob.className = `live-dot ${dotClass}`;
        elements.liveTextMob.innerText = text;
      }
      if (elements.liveDotDesk) {
        elements.liveDotDesk.className = `live-dot ${dotClass}`;
        elements.liveTextDesk.innerText = text;
      }
    }

    // ========== API REQUEST DENGAN HANDLING RESPON ==========
    async function apiRequest(action, method = 'GET', body = null) {
      let url = BACKEND_URL + '?action=' + action + '&_=' + Date.now();
      let options = { 
        method: method, 
        mode: 'cors', 
        cache: 'no-cache',
        headers: {}
      };
      
      if (method === 'POST') {
        options.body = JSON.stringify(body);
        options.headers['Content-Type'] = 'text/plain';
      }

      try {
        if (DEBUG_LOG) console.log('Mengirim request ke:', url, options);
        const response = await fetch(url, options);
        const text = await response.text();
        if (DEBUG_LOG) console.log('Respons mentah:', text);
        
        // Coba cek apakah respons dimulai dengan { atau [ (JSON)
        if (text.trim().startsWith('{') || text.trim().startsWith('[')) {
          return JSON.parse(text);
        } else {
          // Jika bukan JSON, mungkin error HTML
          console.error('Respons bukan JSON:', text);
          throw new Error('Server mengembalikan data bukan JSON. Periksa URL backend atau konsol untuk detail.');
        }
      } catch (fetchError) {
        console.error('Fetch error:', fetchError);
        throw new Error('Koneksi error: ' + fetchError.message);
      }
    }

    // ========== LOGIN (CASE-INSENSITIVE) ==========
    async function handleLogin() {
      // Ubah username ke huruf kecil agar case-insensitive saat dikirim ke backend
      const rawUsername = elements.loginUsername.value.trim();
      const username = rawUsername.toLowerCase();   // <--- CASE-INSENSITIVE
      const password = elements.loginPassword.value.trim();
      
      if (!rawUsername || !password) {
        elements.loginError.innerText = 'Username dan password harus diisi';
        return;
      }

      elements.loginBtn.disabled = true;
      elements.loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses...';
      elements.loginError.innerText = '';

      try {
        const result = await apiRequest('login', 'POST', { username, password });
        if (DEBUG_LOG) console.log('Hasil login:', result);
        if (result.success) {
          currentUser = result.user;
          sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
          showMainApp();
        } else {
          elements.loginError.innerText = result.message || 'Login gagal';
        }
      } catch (err) {
        elements.loginError.innerText = err.message;
      } finally {
        elements.loginBtn.disabled = false;
        elements.loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> MASUK';
      }
    }

    // ========== LOGOUT ==========
    function handleLogout() {
      sessionStorage.removeItem('currentUser');
      currentUser = null;
      currentStaff = null;
      staffData = [];
      lastDataSignature = '';
      lastRenderKey = '';
      stopSync();
      showLogin();
    }

    function makeDataSignature(data) {
      return data.map(s => [
        s.id,
        s.nama,
        s.jabatan,
        s.status,
        s.waktu,
        s.jam_kerja,
        s.cuti,
        s.kategori,
        s.kategori_jadwal,
        s.shift
      ].map(v => String(v ?? '')).join('|')).join('~');
    }

    function scheduleTableRender(force = false) {
      if (!elements.attendanceBody || elements.mainApp.style.display === 'none') return;

      // Hindari render ulang list saat jari sedang scroll cepat di HP.
      // Render ditunda sebentar sampai scroll berhenti supaya tidak blank/hitam.
      if (isMobileView() && mobileScrollActive) {
        pendingRenderAfterScroll = true;
        pendingRenderForce = pendingRenderForce || force;
        if (force) lastRenderKey = '';
        return;
      }

      if (force) lastRenderKey = '';
      if (tableRenderFrame) return;

      tableRenderFrame = requestAnimationFrame(() => {
        tableRenderFrame = null;
        const searchVal = elements.staffSearch ? elements.staffSearch.value : '';
        renderTable(searchVal, force);
      });
    }

    // ========== SINKRONISASI DATA STAFF ==========
    async function startSync() {
      if (syncInProgress || !currentUser) return;
      syncInProgress = true;
      if (syncTimer) {
        clearTimeout(syncTimer);
        syncTimer = null;
      }

      try {
        const result = await apiRequest('load');
        if (result.success) {
          // Filter staff dengan nama tidak kosong, baca OFFDAY/CUTI dari backend
          const normalizedData = result.data.filter(staff => staff.nama && staff.nama.trim() !== "").map(staff => {
            const kategoriText = String(staff.kategori || staff.kategori_jadwal || staff.status || staff.shift || staff.jam_kerja || '').toUpperCase();
            const shiftText = String(staff.shift || staff.status || staff.jam_kerja || '').toUpperCase();
            const isOff = staff.cuti === true || staff.cuti === 'true' || ['OFF','OFFDAY','OFF DAY','CUTI','LIBUR'].some(x => kategoriText.includes(x) || shiftText.includes(x));
            staff.cuti = isOff;

            // KUNCI JAM KERJA: jangan ambil jam dari sheet kalau shift aktif.
            // PAGI wajib 07:45:00, MALAM wajib 19:45:00.
            if (!staff.cuti) {
              const sft = String(staff.shift || '').toUpperCase();
              if (sft.includes('MALAM')) staff.jam_kerja = '19:45:00';
              else if (sft.includes('PAGI')) staff.jam_kerja = '07:45:00';
              else if (!staff.jam_kerja) staff.jam_kerja = '07:45:00';
            }

            // Untuk OFFDAY/CUTI, tampilkan labelnya sebagai jam kerja.
            if (staff.cuti) {
              staff.kategori = staff.kategori || staff.kategori_jadwal || staff.status || staff.shift || 'OFFDAY';
              if (!staff.jam_kerja) staff.jam_kerja = staff.kategori;
            }
            return staff;
          });

          const newSignature = makeDataSignature(normalizedData);
          const dataChanged = newSignature !== lastDataSignature;
          staffData = normalizedData;
          
          // Cari data staff yang sesuai dengan user login (case-insensitive)
          if (currentUser) {
            const usernameLower = String(currentUser.username).toLowerCase();
            // Cari berdasarkan id (username) dengan case-insensitive
            currentStaff = staffData.find(s => String(s.id).toLowerCase() === usernameLower);
            
            // Fallback: cari berdasarkan nama (case-insensitive) jika tidak ditemukan
            if (!currentStaff) {
              currentStaff = staffData.find(s => s.nama.toLowerCase() === currentUser.nama.toLowerCase());
            }
          }

          if (dataChanged) {
            lastDataSignature = newSignature;
            updateUI(true);
          } else {
            updateStats();
            updateUserInfo();
          }
          setLiveStatus('connected');
        } else {
          throw new Error(result.message);
        }
      } catch (err) {
        console.error("Sync Error:", err);
        setLiveStatus('disconnected');
        showToast('Gagal memuat data: ' + err.message, 'error');
      } finally {
        syncInProgress = false;
        if (currentUser) {
          syncTimer = setTimeout(startSync, 4000);
        }
      }
    }

    function updateUI(forceRender = true) {
      updateStats();
      updateUserInfo();
      const searchVal = elements.staffSearch ? elements.staffSearch.value : '';
      if (isMobileView() && mobileScrollActive) {
        pendingRenderAfterScroll = true;
        pendingRenderForce = pendingRenderForce || forceRender;
        if (forceRender) lastRenderKey = '';
        return;
      }
      renderTable(searchVal, forceRender);
    }

    function updateStats() {
      // Hanya hitung staff yang tidak cuti (aktif)
      const activeStaff = staffData.filter(s => !s.cuti);
      const total = activeStaff.length;
      const present = activeStaff.filter(s => s.status === 'Sudah Absen').length;
      elements.totalStaff.innerText = total;
      elements.presentCount.innerText = present;
      elements.absentCount.innerText = total - present;
    }

    function updateUserInfo() {
      if (currentStaff) {
        const initial = currentStaff.nama.substring(0, 2).toUpperCase();
        const isHadir = currentStaff.status === 'Sudah Absen';
        const isCuti = currentStaff.cuti;
        const offLabel = currentStaff.kategori || currentStaff.kategori_jadwal || currentStaff.status || currentStaff.shift || currentStaff.jam_kerja || 'OFFDAY';
        let statusText = isHadir ? 'Sudah Absen' : (isCuti ? offLabel : 'Belum Absen');
        const waktu = isHadir ? formatWaktu(currentStaff.waktu) : '-';
        
        elements.userInfoContainer.innerHTML = `
          <div class="user-avatar">${initial}</div>
          <div class="user-detail">
            <h3>${currentStaff.nama}</h3>
            <p>${currentStaff.jabatan || 'Staff'} · ${isCuti ? 'Jadwal ' + String(offLabel).toUpperCase() : 'Jam kerja ' + currentStaff.jam_kerja} · ${statusText} ${waktu !== '-' ? 'jam ' + waktu : ''}</p>
          </div>
        `;
        
        // Disable tombol jika sudah hadir atau sedang cuti
        elements.submitBtn.disabled = isHadir || isCuti;
        if (isCuti) {
          elements.submitBtn.innerHTML = `<i class="fas fa-ban"></i> ${String(offLabel).toUpperCase()}`;
        } else if (isHadir) {
          elements.submitBtn.innerHTML = '<i class="fas fa-check-circle"></i> SUDAH ABSEN';
        } else {
          elements.submitBtn.innerHTML = '<i class="fas fa-check-circle"></i> ABSEN';
        }
      } else {
        // Jika currentStaff tidak ditemukan, tampilkan skeleton loading
        showSkeletonUserInfo();
        elements.submitBtn.disabled = true;
        elements.submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> LOADING...';
      }
    }

    // Fungsi konversi waktu "HH:MM:SS" ke detik
    function timeToSeconds(timeStr) {
      if (!timeStr) return 0;
      const m = String(timeStr).match(/(\d{1,2}):(\d{2})(?::(\d{2}))?/);
      if (!m) return 0;
      return (+m[1]) * 3600 + (+m[2]) * 60 + (+(m[3] || 0));
    }

    function menitTelatText(jamKerja, pembandingWaktu) {
      const jk = timeToSeconds(jamKerja);
      const now = timeToSeconds(pembandingWaktu || currentTimeStr);
      const diff = Math.max(0, Math.floor((now - jk) / 60));
      if (diff <= 0) return '';
      return diff + ' menit';
    }

    function renderTable(filter = "", forceRender = false) {
      const tbody = elements.attendanceBody;
      if (isMobileView() && mobileScrollActive) {
        pendingRenderAfterScroll = true;
        pendingRenderForce = pendingRenderForce || forceRender;
        if (forceRender) lastRenderKey = '';
        return;
      }
      const minuteBucket = currentTimeStr.slice(0, 5);
      const renderKey = `${filter}__${minuteBucket}__${lastDataSignature}`;
      if (!forceRender && renderKey === lastRenderKey) return;
      lastRenderKey = renderKey;

      let data = [...staffData];

      if (filter) {
        data = data.filter(s => String(s.nama || '').toLowerCase().includes(filter.toLowerCase()));
      }

      if (data.length === 0) {
        tbody.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);opacity:0.5">Tidak ada data</div>';
        return;
      }

      const nowSec = timeToSeconds(currentTimeStr);
      const TOLERANSI = 15 * 60;

      const upcoming = [];
      const past = [];
      const offList = [];

      data.forEach(staff => {
        if (staff.cuti) {
          offList.push(staff);
          return;
        }

        const staffJamSec = timeToSeconds(staff.jam_kerja);
        // Yang sudah lewat jam kerja langsung dipindah ke bawah.
        if (staffJamSec > nowSec) upcoming.push(staff);
        else past.push(staff);
      });

      upcoming.sort((a, b) => timeToSeconds(a.jam_kerja) - timeToSeconds(b.jam_kerja));
      past.sort((a, b) => timeToSeconds(a.jam_kerja) - timeToSeconds(b.jam_kerja));
      offList.sort((a, b) => String(a.kategori || a.status || '').localeCompare(String(b.kategori || b.status || '')) || String(a.nama).localeCompare(String(b.nama)));

      const activeList = upcoming.concat(past);

      const renderStaffRow = (staff) => {
        const isHadir = staff.status === 'Sudah Absen';
        const isOff = staff.cuti === true;
        const offLabel = String(staff.kategori || staff.kategori_jadwal || staff.status || staff.shift || 'OFFDAY').toUpperCase();
        const time = formatWaktu(staff.waktu);
        const initial = String(staff.nama || '?').substring(0, 2).toUpperCase();
        const rowClass = isOff ? `off-row ${offLabel.includes('CUTI') ? 'cuti-row' : 'offday-row'}` : (isHadir ? 'is-hadir' : 'is-belum');
        const chipClass = offLabel.includes('CUTI') ? 'cuti' : (isOff ? 'offday' : '');

        let statusText = 'MENUNGGU';
        let statusClass = '';
        let blinkClass = '';
        let noteText = '';
        let terlambatRowClass = '';
        let noteIcon = '';

        if (isOff) {
          statusText = offLabel;
          statusClass = offLabel.includes('CUTI') ? 'status-bisa' : 'status-terlambat';
          noteText = 'Tidak perlu absen';
          noteIcon = '';
        } else if (!isHadir && staff.jam_kerja) {
          const jamKerjaSec = timeToSeconds(staff.jam_kerja);
          const batasAwalSec = jamKerjaSec - 15 * 60;

          if (nowSec >= jamKerjaSec) {
            const telat = menitTelatText(staff.jam_kerja);
            statusText = 'TERLAMBAT';
            statusClass = 'status-terlambat';
            terlambatRowClass = 'terlambat-row';
            noteText = telat ? `Terlambat ${telat}` : 'Terlambat';
            noteIcon = '<span class="warning-note danger-note"><i class="fas fa-circle-exclamation"></i></span>';
          } else if (nowSec >= batasAwalSec && nowSec < jamKerjaSec) {
            statusText = 'BISA ABSEN';
            statusClass = 'status-bisa';
            blinkClass = 'blink-warning';
            noteText = 'tolong bangunkan anak ini';
            noteIcon = '<span class="warning-note"><i class="fas fa-triangle-exclamation"></i></span>';
          } else {
            statusText = 'MENUNGGU';
            noteIcon = '';
          }
        } else if (isHadir) {
          statusText = 'SUDAH ABSEN';
          const waktuAbsenSec = timeToSeconds(time);
          const jamKerjaSec = timeToSeconds(staff.jam_kerja);
          if (waktuAbsenSec && jamKerjaSec && waktuAbsenSec > jamKerjaSec) {
            noteText = `Telat ${menitTelatText(staff.jam_kerja, time)}`;
            noteIcon = '<span class="warning-note danger-note"><i class="fas fa-circle-exclamation"></i></span>';
          } else if (waktuAbsenSec) {
            noteText = 'Tepat waktu';
            noteIcon = '';
          }
        }

        const timeText = isHadir && time !== '-' ? time : '-';
        const kategoriChip = isOff ? `<span class="kategori-chip ${chipClass}">${offLabel}</span>` : '';
        const jadwalText = isOff ? `${staff.jabatan || 'Staff'} · ${offLabel}` : `${staff.jabatan || 'Staff'} · ${staff.jam_kerja}`;

        return `
          <div class="staff-row ${rowClass} ${blinkClass} ${terlambatRowClass}" title="${noteText}">
            <div class="user-info-small">
              <div class="avatar-small">${initial}</div>
              <div class="user-detail-small">
                <h4>${staff.nama} ${kategoriChip} ${noteIcon}</h4>
                <span>${jadwalText}</span>
                ${noteText ? `<div class="note">${noteText}</div>` : ''}
              </div>
            </div>
            <div style="text-align:right">
              <div class="status-badge ${statusClass}">${statusText}</div>
              <div class="time-display">${timeText}</div>
            </div>
          </div>
        `;
      };

      let html = '';
      html += `<div class="section-divider"><span><i class="fas fa-user-check"></i> Jadwal Aktif</span><span>${activeList.length} Staff</span></div>`;
      html += activeList.length ? activeList.map(renderStaffRow).join('') : '<div style="text-align:center;padding:20px;color:var(--text-muted);opacity:0.5">Tidak ada jadwal aktif</div>';

      html += `<div class="section-divider off-section"><span><i class="fas fa-calendar-xmark"></i> OFFDAY / CUTI</span><span>${offList.length} Staff</span></div>`;
      html += offList.length ? offList.map(renderStaffRow).join('') : '<div style="text-align:center;padding:16px;color:var(--text-muted);opacity:0.45">Tidak ada OFFDAY / CUTI</div>';

      tbody.innerHTML = html;
    }

    function filterTable() {
      if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
      searchDebounceTimer = setTimeout(() => {
        scheduleTableRender(true);
      }, 120);
    }

    async function handleMarkAttendance() {
      if (isProcessing) return;
      if (!currentStaff) {
        showToast('Data staff tidak ditemukan', 'error');
        return;
      }
      if (currentStaff.cuti) {
        showToast('Jadwal Anda OFFDAY / CUTI, tidak dapat absen', 'warning');
        return;
      }
      if (currentStaff.status === 'Sudah Absen') {
        showToast('Anda sudah absen hari ini', 'warning');
        return;
      }

      isProcessing = true;
      const btn = elements.submitBtn;
      btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Proses...';

      try {
        const result = await apiRequest('absen', 'POST', { id: currentStaff.id });
        if (result.success) {
          showToast('Berhasil Absen', 'success');
          // Update data staff
          currentStaff.status = 'Sudah Absen';
          currentStaff.waktu = result.waktu;
          // Update juga di staffData
          const index = staffData.findIndex(s => s.id === currentStaff.id);
          if (index !== -1) {
            staffData[index].status = 'Sudah Absen';
            staffData[index].waktu = result.waktu;
          }
          lastDataSignature = makeDataSignature(staffData);
          updateUI(true);
        } else {
          showToast(result.message || 'Gagal', 'error');
        }
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        isProcessing = false;
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-check-circle"></i> ABSEN';
        // Jika sudah absen, button akan didisable oleh updateUserInfo
        updateUserInfo();
      }
    }

    function showToast(msg, type) {
      const t = elements.toast;
      t.innerHTML = `<i class="fas ${type==='success'?'fa-check-circle':'fa-exclamation-circle'}"></i> ${msg}`;
      t.className = `toast show ${type}`;
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function togglePasswordVisibility() {
      const input = document.getElementById('loginPassword');
      const icon = document.getElementById('passwordToggleIcon');
      const btn = document.getElementById('passwordToggle');
      const isHidden = input.type === 'password';

      input.type = isHidden ? 'text' : 'password';
      icon.className = isHidden ? 'fas fa-eye-slash' : 'fas fa-eye';
      btn.setAttribute('aria-label', isHidden ? 'Sembunyikan password' : 'Tampilkan password');
    }

    // Event listener untuk Enter di form login
    document.getElementById('loginPassword').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        handleLogin();
      }
    });
    document.getElementById('loginUsername').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        document.getElementById('loginPassword').focus();
      }
    });


    window.addEventListener('resize', function() {
      if (elements.mainApp && elements.mainApp.style.display !== 'none') {
        elements.mainApp.style.display = window.innerWidth <= 900 ? 'block' : 'grid';
      }
    });

  </script>
</body>
</html>
